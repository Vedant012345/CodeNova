<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Superuser Login — CodeNova</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="/static/css/dark-forms.css"/>
<style>
  body{font-family:'Inter',sans-serif;background:#0b0e14;color:#ecedf6;}
  .font-headline{font-family:'Plus Jakarta Sans',sans-serif;}
  .material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;}
  .fill-icon{font-variation-settings:'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 24;}
  .gradient-bg{background:linear-gradient(135deg,#b6a0ff,#00affe);}
  .gradient-text{background:linear-gradient(135deg,#b6a0ff,#00affe);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
  .glass{background:rgba(22,26,33,0.9);backdrop-filter:blur(16px);border:1px solid rgba(169,143,255,0.1);}
  .su-input{width:100%;background:#0f1623;border:1px solid rgba(255,255,255,0.10);border-radius:0.75rem;padding:0.75rem 1rem;font-size:0.875rem;color:#ffffff;}
  .su-input:focus{outline:none;border-color:rgba(124,111,255,0.55);box-shadow:0 0 0 3px rgba(53,37,205,0.14);}
  .su-input::placeholder{color:rgba(255,255,255,0.42);}
</style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
  <div class="absolute inset-0 pointer-events-none">
    <div class="absolute top-1/3 left-1/3 w-96 h-96 rounded-full blur-[140px]" style="background:rgba(182,160,255,0.08)"></div>
    <div class="absolute bottom-1/3 right-1/3 w-96 h-96 rounded-full blur-[140px]" style="background:rgba(0,175,254,0.06)"></div>
  </div>
  <div class="w-full max-w-sm glass rounded-2xl p-10 relative z-10">
    <div class="text-center mb-8">
      <div class="flex justify-center mb-4">
        <img src="/static/images/codenova_logo.png" alt="CodeNova" class="h-10 w-auto object-contain" style="max-width:180px;">
      </div>
      <h1 class="font-headline text-2xl font-extrabold gradient-text mb-1">Superuser Panel</h1>
      <p class="text-xs text-gray-500 uppercase tracking-widest">CodeNova Admin UI</p>
    </div>
    {% if error %}
    <div class="mb-5 p-3 rounded-xl bg-red-950/50 border border-red-800/30 text-sm text-red-400 flex items-center gap-2">
      <span class="material-symbols-outlined fill-icon text-base">error</span>{{ error }}
    </div>
    {% endif %}
    <form method="post">
      {% csrf_token %}
      <div class="space-y-4">
        <div>
          <label class="block text-xs font-bold uppercase tracking-wider text-gray-500 mb-2">Username</label>
          <input type="text" name="username" placeholder="Superuser username" autocomplete="username" class="su-input" required/>
        </div>
        <div>
          <label class="block text-xs font-bold uppercase tracking-wider text-gray-500 mb-2">Password</label>
          <input type="password" name="password" placeholder="Password" autocomplete="current-password" class="su-input" required/>
        </div>
        <button type="submit" class="w-full py-3.5 rounded-full gradient-bg font-bold text-black text-sm hover:opacity-90 transition-all mt-2">
          Access Admin Panel
        </button>
      </div>
    </form>
    <div class="mt-6 p-3 bg-yellow-950/30 border border-yellow-800/20 rounded-xl text-xs text-yellow-400 flex items-start gap-2">
      <span class="material-symbols-outlined fill-icon text-sm mt-0.5">lock</span>
      <p>Superuser credentials only. Unauthorised access is prohibited.</p>
    </div>
    <div class="mt-4 text-center">
      <a href="{% url 'portal:homepage' %}" class="text-xs text-gray-600 hover:text-gray-400 transition-colors">← Back to Homepage</a>
    </div>
  </div>
</body>
</html>
