<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Host Login — CodeNova</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config={darkMode:"class",theme:{extend:{colors:{"primary":"#b6a0ff","secondary":"#00affe","surface":"#0b0e14","surface-container":"#161a21","on-surface":"#ecedf6","on-surface-variant":"#a9abb3","error":"#ff6e84"},fontFamily:{"headline":["Plus Jakarta Sans"]}}}}</script>
<link rel="stylesheet" href="/static/css/dark-forms.css"/>
<style>
  body{font-family:'Inter',sans-serif;background:#0b0e14;color:#ecedf6;}
  .fill-icon{font-variation-settings:'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 24;}
  .gradient-bg{background:linear-gradient(135deg,#b6a0ff,#00affe);}
  .gradient-text{background:linear-gradient(135deg,#b6a0ff,#00affe);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
  .glass{background:rgba(22,26,33,0.95);border:1px solid rgba(169,143,255,0.12);backdrop-filter:blur(20px);}
  .h-input{width:100%;background:#0f1623;border:1px solid rgba(255,255,255,0.10);border-radius:0.75rem;padding:0.75rem 1rem;font-size:0.9rem;color:#ffffff;transition:all 0.15s;}
  .h-input:focus{outline:none;border-color:rgba(124,111,255,0.55);box-shadow:0 0 0 3px rgba(53,37,205,0.14);}
  .h-input::placeholder{color:rgba(255,255,255,0.42);}
</style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
  <!-- Background glow -->
  <div class="fixed inset-0 overflow-hidden pointer-events-none">
    <div class="absolute top-1/4 left-1/3 w-96 h-96 bg-primary/5 rounded-full blur-3xl"></div>
    <div class="absolute bottom-1/4 right-1/3 w-80 h-80 bg-secondary/5 rounded-full blur-3xl"></div>
  </div>

  <div class="w-full max-w-sm relative">
    <!-- Logo -->
    <div class="text-center mb-8">
      <div class="flex justify-center mb-4">
        <img src="/static/images/codenova_logo.png" alt="CodeNova" class="h-12 w-auto object-contain" style="max-width:200px;">
      </div>
      <p class="text-on-surface-variant text-sm mt-1">Host / Teacher Portal</p>
    </div>

    <!-- Card -->
    <div class="glass rounded-2xl p-8">
      <h2 class="font-headline font-bold text-on-surface text-lg mb-1">Sign in to Host Dashboard</h2>
      <p class="text-xs text-on-surface-variant mb-6">Superuser access only. No public registration.</p>

      {% if error %}
      <div class="mb-4 px-4 py-3 rounded-xl bg-error/10 border border-error/20 text-error text-sm flex items-center gap-2">
        <span class="material-symbols-outlined fill-icon text-base">error</span>{{ error }}
      </div>
      {% endif %}

      <form method="post" class="space-y-4">
        {% csrf_token %}
        <div>
          <label class="block text-xs font-semibold text-on-surface-variant uppercase tracking-wider mb-1.5">Username</label>
          <input type="text" name="username" required autofocus placeholder="admin username"
            class="h-input"/>
        </div>
        <div>
          <label class="block text-xs font-semibold text-on-surface-variant uppercase tracking-wider mb-1.5">Password</label>
          <input type="password" name="password" required placeholder="••••••••"
            class="h-input"/>
        </div>
        <button type="submit" class="w-full gradient-bg text-black font-bold py-3 rounded-full hover:opacity-90 transition-opacity flex items-center justify-center gap-2 mt-2">
          <span class="material-symbols-outlined fill-icon text-base">login</span>
          Access Host Dashboard
        </button>
      </form>
    </div>

    <p class="text-center text-xs text-on-surface-variant mt-4">
      <a href="{% url 'portal:login' %}" class="text-primary hover:underline">← Back to Student Login</a>
    </p>
  </div>
</body>
</html>
